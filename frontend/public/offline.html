<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opsra — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0D1B2A;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #112233;
      border: 1px solid #1e3a4f;
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
      max-width: 380px;
      width: 100%;
    }
    .logo {
      width: 56px; height: 56px;
      background: #028090;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 800;
      margin: 0 auto 24px;
      color: white;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
    p  { font-size: 14px; color: #7A9BAD; line-height: 1.6; margin-bottom: 28px; }
    button {
      background: #028090; color: white; border: none;
      border-radius: 10px; padding: 13px 28px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">O</div>
    <h1>You're offline</h1>
    <p>Opsra needs an internet connection to load your data. Please check your connection and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
