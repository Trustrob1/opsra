[pytest]
# Opsra test suite configuration
# Run commands from Build Status:
#   pytest tests/unit/ -v
#   pytest tests/integration/ -v
#   pytest tests/webhooks/ -v
#   pytest tests/ -v
#   pytest tests/ --cov=app --cov-report=term-missing

testpaths = tests
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short test summary for failures
addopts = -v --tb=short

# Mark definitions
markers =
    unit: Pure unit tests — no network, no database
    integration: Integration tests — FastAPI TestClient with mocked Supabase
    webhook: Webhook handler tests — httpx + respx mocks